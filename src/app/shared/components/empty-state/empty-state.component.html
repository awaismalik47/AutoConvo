<div class="empty">
  <div class="empty-icon">{{ icon }}</div>
  <p class="empty-title">{{ title }}</p>
  @if (subtitle) {
    <p class="empty-sub">{{ subtitle }}</p>
  }
  @if (actionLabel) {
    <button type="button" class="empty-btn" (click)="action.emit()">
      {{ actionLabel }}
    </button>
  }
</div>
