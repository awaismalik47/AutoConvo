<div class="auth">
  <div class="auth__panel">
    <div class="auth__brand">
      <span class="auth__logo" aria-hidden="true">◆</span>
      <span class="auth__name">AutoConvo</span>
    </div>
    <h1 class="auth__title">Create account</h1>
    <p class="auth__hint">Start sending campaigns in minutes.</p>

    <form class="auth__form" [formGroup]="form" (ngSubmit)="submit()">
      <label class="auth__field">
        <span class="auth__label">Name</span>
        <input type="text" formControlName="name" autocomplete="name" placeholder="Jane Doe" />
        @if (form.controls.name.touched && form.controls.name.invalid) {
          <span class="auth__err">Enter your name</span>
        }
      </label>
      <label class="auth__field">
        <span class="auth__label">Email</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="you@company.com"
        />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <span class="auth__err">Valid email required</span>
        }
      </label>
      <label class="auth__field">
        <span class="auth__label">Password</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="new-password"
          placeholder="8+ characters"
        />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <span class="auth__err">Min. 8 characters</span>
        }
      </label>

      <button type="submit" class="auth__btn" [disabled]="submitting">
        {{ submitting ? 'Creating…' : 'Continue' }}
      </button>
    </form>

    <p class="auth__footer">
      Already have an account?
      <a routerLink="/auth/login">Sign in</a>
    </p>
    <div class="auth__legal-btns" role="group" aria-label="Legal">
      <a routerLink="/privacy-policy" class="auth__legal-btn">Privacy Policy</a>
      <a routerLink="/terms" class="auth__legal-btn">Terms of Service</a>
    </div>
  </div>
</div>
