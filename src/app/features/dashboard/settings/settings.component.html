<div class="set">
  <div class="set__head">
    <h2 class="set__title">Settings</h2>
    <p class="set__sub">Profile and subscription.</p>
  </div>

  @if (auth.currentUser(); as u) {
    <div class="card">
      <div class="row">
        <span class="label">Name</span>
        <span class="val">{{ u.name }}</span>
      </div>
      <div class="row">
        <span class="label">Email</span>
        <span class="val">{{ u.email }}</span>
      </div>
      <div class="row">
        <span class="label">Plan</span>
        <span class="plan">{{ u.plan | titlecase }}</span>
      </div>
    </div>
  } @else {
    <p class="muted">No profile loaded.</p>
  }

  <div class="set__legal card">
    <h3 class="set__legal-title">Legal</h3>
    <p class="set__legal-desc">
      Read our policies for data handling and using AutoConvo.
    </p>
    <div class="set__legal-btns">
      <a routerLink="/privacy" class="set__btn set__btn--primary">Privacy Policy</a>
      <a routerLink="/terms" class="set__btn set__btn--primary">Terms of Service</a>
    </div>
  </div>
</div>
