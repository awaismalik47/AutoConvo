# Render Static Site — https://render.com/docs/static-sites
# Render runs `npm install` before `buildCommand`; do not add a second full `npm ci` unless you know you need it.
staticSites:
  - name: autoconvo
    rootDir: .
    buildCommand: npm run build:render
    publishPath: dist/autoconvo/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
